<!DOCTYPE html>
<html>
<head>
<script>
  const hash = window.location.hash
  const params = new URLSearchParams(hash.replace('#', ''))
  const type = params.get('type')
  if (type === 'recovery') {
    const token = params.get('access_token')
    const refresh = params.get('refresh_token')
    window.location.href = `scratchrpay://reset-password#access_token=${token}&refresh_token=${refresh}&type=recovery`
  }
</script>
</head>
<body>
<p>Redirecting to Scratchr Pay...</p>
</body>
</html>
